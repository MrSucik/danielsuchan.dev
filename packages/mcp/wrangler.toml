name = "danielsuchan-mcp"
main = "src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

[[routes]]
pattern = "mcp.danielsuchan.dev/*"
zone_name = "danielsuchan.dev"

# Workers AI binding — exposes env.AI to AI-powered tools (ai_ask, ai_summarize, etc).
# Free tier: 10,000 Neurons/day (resets at 00:00 UTC). Per-call cost varies by
# input/output length — see the Workers AI dashboard for actuals.
[ai]
binding = "AI"
